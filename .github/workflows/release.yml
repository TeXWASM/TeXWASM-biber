name: Release

on:
  push:
    tags:
      - '*'
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ github.token }}
  GH_REPO: ${{ github.repository }}

jobs:
  create-draft:
    name: Create draft release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v7
      - name: Extract release notes from CHANGELOG.md
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          awk -v ver="$VER" '
            /^## \[/{if(s) exit; if(index($0,"["ver"]")) s=1; next}
            s
          ' CHANGELOG.md > release-notes.md
      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --verify-tag \
            --draft

  cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [create-draft]
    if: github.ref_type == 'tag'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v7

      - name: Install cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build
        run: cargo build -p biber-cli --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          strip biber${{ matrix.suffix }} 2>/dev/null || true
          tar czf biber-${{ github.ref_name }}-${{ matrix.target }}.tar.gz biber${{ matrix.suffix }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: target/${{ matrix.target }}/release/biber-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - name: Upload asset
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            target/${{ matrix.target }}/release/biber-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    needs: [create-draft]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build WASM
        run: cargo build -p biber-wasm --release --target wasm32-unknown-unknown

      - name: Generate JS bindings
        run: |
          wasm-bindgen target/wasm32-unknown-unknown/release/biber_wasm.wasm \
            --out-dir biber-wasm-pkg \
            --typescript

      - name: Package
        run: |
          cp LICENSE README.md biber-wasm-pkg/
          cp -r data/* biber-wasm-pkg/ 2>/dev/null || true
          cd biber-wasm-pkg && tar czf biber-${{ github.ref_name }}-wasm.tar.gz *

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: biber-wasm-pkg/biber-${{ github.ref_name }}-wasm.tar.gz

      - name: Upload asset
        run: |
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            biber-wasm-pkg/biber-${{ github.ref_name }}-wasm.tar.gz

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [cli, wasm]
    if: github.ref_type == 'tag'
    steps:
      - name: Publish draft release
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false
