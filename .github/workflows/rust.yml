name: Rust CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-test:
    name: Build & test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (default features)
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  wasm-unknown:
    name: Build wasm32-unknown-unknown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Check biber-core (no default features, no fs)
        run: cargo check -p biber-core --no-default-features

      - name: Check biber-wasm
        run: cargo check -p biber-wasm --target wasm32-unknown-unknown

  wasm-wasi:
    name: Build wasm32-wasip1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasi-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Check biber-cli (wasi)
        run: cargo check -p biber-cli --target wasm32-wasip1
